name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ci
      AUTH_SECRET: ci_build_placeholder_secret_min_32_chars_long
      PLAYWRIGHT_PORT: "3001"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Service worker CACHE bump (PRs)
        if: github.event_name == 'pull_request'
        run: node scripts/check-sw-cache-bump.mjs
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: node scripts/generate-pwa-icons.mjs
      - run: node scripts/validate-pwa-manifest.mjs
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
